apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend-deployment
  namespace: default
  labels:
    app: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "todo-backend"
        dapr.io/app-port: "7860"
        dapr.io/components-path: "/components"
        dapr.io/config: "app-config"
        dapr.io/log-as-json: "true"
        dapr.io/app-protocol: "http"
        dapr.io/enable-api-logging: "true"
    spec:
      containers:
        - name: todo-backend
          # Build locally: docker build -t todo-backend:latest ./backend
          # Then: minikube image load todo-backend:latest
          image: todo-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 7860
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: jwt-secret-key
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: groq-api-key
            - name: ALLOWED_ORIGINS
              value: "http://todo-frontend-service"
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: todo-backend-service
  namespace: default
spec:
  selector:
    app: todo-backend
  ports:
    - protocol: TCP
      port: 7860
      targetPort: 7860
  type: ClusterIP
