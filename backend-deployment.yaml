apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend-deployment
  namespace: default
  labels:
    app: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "todo-backend"
        dapr.io/app-port: "8000"
        dapr.io/components-path: "/components"
        dapr.io/config: "app-config"
        dapr.io/log-as-json: "true"
        dapr.io/app-protocol: "http"
        dapr.io/enable-api-logging: "true"
    spec:
      containers:
        - name: todo-backend
          image: python:3.11-slim
          command: ['sh', '-c']
          args:
            - |
              apt-get update && apt-get install -y git && 
              git clone https://github.com/microsoft/TODO-intelligence-platform-backend.git /app &&
              cd /app &&
              pip install --no-cache-dir -r requirements.txt &&
              python -m src.main
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://todo_user:todo_password@postgres-service:5432/todo_db"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: openai-api-key
            - name: CORS_ORIGINS
              value: '["http://*", "https://*"]'
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: todo-backend-service
  namespace: default
spec:
  selector:
    app: todo-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP